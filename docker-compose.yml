version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: music_redis
    ports:
      - "6379:6379"   # 映射到本机
    networks:
      - music_net

  app:
    build: .                     # 使用当前目录的 Dockerfile 构建
    container_name: music_app
    ports:
      - "8000:8000"
    environment:
      # 传递环境变量，覆盖项目里的 Redis 连接配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      # 挂载上传目录，使数据在容器外持久化
      - ./upload:/py_codes/half_music_upload
      # 挂载数据库文件，使 SQLite 持久化
      - ./data:/app/data
    depends_on:
      - redis
    networks:
      - music_net

networks:
  music_net:
    driver: bridge